# AI-assisted automated triage (EXPLORATORY layer — contrast with manual structured-prompt).
# Separate workflow: fires AFTER the main "CI/CD Pipeline" completes, only when it FAILED.
# This is the automated counterpart to our manual ChatGPT/Claude triage — used in the seminar
# to demonstrate where an automated AI layer adds value vs noise (e.g. it correlates failures
# with PR diffs, so a flaky test with NO code change can be MISattributed — Failure Mode FM-2/3).
#
# Uses the same self-hosted Ollama instance and model as the Qodo Cover workflow.
# Non-blocking by construction: a separate workflow_run cannot fail the triggering pipeline.
name: AI Triage (auto, exploratory)

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
  # Manual test harness: run against a specific failed run WITHOUT merging to default branch.
  # Get a run id from: gh run list --workflow "CI/CD Pipeline"
  workflow_dispatch:
    inputs:
      run_id:
        description: "Workflow run ID of a failed CI/CD Pipeline run to analyze"
        required: true

permissions:
  contents: read
  pull-requests: write   # allows optional PR comment
  actions: read          # read logs/artifacts of the triggering run

jobs:
  ai-triage:
    name: Analyze failed pipeline (local Ollama)
    # Auto path: only on a failed pipeline. Manual path: always (dispatch is explicit).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Verify local Ollama model
        run: |
          curl --fail --silent --show-error http://127.0.0.1:11434/api/tags > /dev/null
          ollama show qwen2.5-coder:7b

      - name: AI failure analysis
        id: triage
        uses: calebevans/gha-failure-analysis@v0.2.0
        # Fail visibly while validating the local setup; restore true once it is stable.
        continue-on-error: false
        env:
          # The Docker action runs as a non-root user and cannot write under /github/home.
          HF_HOME: /tmp/huggingface
          HF_HUB_CACHE: /tmp/huggingface/hub
          XDG_CACHE_HOME: /tmp/cache
          DSPY_CACHEDIR: /tmp/dspy-cache
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Manual dispatch supplies run_id; auto path uses the triggering run's id.
          run-id: ${{ github.event.inputs.run_id || github.event.workflow_run.id }}
          # This action runs in Docker, so use the Docker host gateway instead of localhost.
          llm-provider: ollama
          llm-model: qwen2.5-coder:7b
          # v0.2.0 validates this input even though local Ollama ignores API keys.
          llm-api-key: ollama
          llm-base-url: http://172.17.0.1:11434
          analyze-pr-context: 'true'
          post-pr-comment: 'true'
      # The action writes its own GitHub job summary and redacts secrets internally.
      # No extra "echo summary" step (shell-injects on backticks) and no artifact upload
      # (the report is written inside the action's container /tmp, unreachable by the runner).
