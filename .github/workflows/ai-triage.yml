# AI-assisted automated triage (EXPLORATORY layer — contrast with manual structured-prompt).
# Separate workflow: fires AFTER the main "CI/CD Pipeline" completes, only when it FAILED.
# This is the automated counterpart to our manual ChatGPT/Claude triage — used in the seminar
# to demonstrate where an automated AI layer adds value vs noise (e.g. it correlates failures
# with PR diffs, so a flaky test with NO code change can be MISattributed — Failure Mode FM-2/3).
#
# Requires repo secret: ANTHROPIC_API_KEY (Settings > Secrets and variables > Actions).
# Non-blocking by construction: a separate workflow_run cannot fail the triggering pipeline.
name: AI Triage (auto, exploratory)

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write   # allows optional PR comment
  actions: read          # read logs/artifacts of the triggering run

jobs:
  ai-triage:
    name: Analyze failed pipeline with Claude
    # Only run when the pipeline actually failed — no point triaging a green run.
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: AI failure analysis
        id: triage
        uses: calebevans/gha-failure-analysis@v0.2.0
        continue-on-error: true   # exploratory: never let triage tooling break anything
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          llm-provider: anthropic
          llm-model: claude-sonnet-5
          llm-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          analyze-pr-context: 'true'
          post-pr-comment: 'true'

      - name: Show triage summary
        if: always()
        run: |
          echo "### AI Triage (automated, exploratory)" >> $GITHUB_STEP_SUMMARY
          echo "**Category:** ${{ steps.triage.outputs.category }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.triage.outputs.summary }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload full JSON report
        if: always() && steps.triage.outputs.report-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ai-triage-report
          path: ${{ steps.triage.outputs.report-path }}
