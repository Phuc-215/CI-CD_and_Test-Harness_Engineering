name: Qodo Cover

on:
  pull_request:
    branches:
      - demo
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-tests:
    name: Generate backend tests
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.draft == false
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install test harness dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Verify local Ollama model
        run: |
          curl --fail --silent --show-error http://127.0.0.1:11434/api/tags > /dev/null
          ollama show qwen2.5-coder:7b

      - name: Generate tests with Qodo Cover
        uses: qodo-ai/qodo-ci/.github/actions/qodo-cover-pr@v0.1.16
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: demo
          diff_coverage: false
          project_language: javascript
          project_root: .
          source_folder: .
          test_folder: tests/api/guard
          test_command: bash scripts/qodo-test-coverage.sh
          code_coverage_report_path: coverage/cobertura-coverage.xml
          coverage_type: cobertura
          model: ollama_chat/qwen2.5-coder:7b
          desired_coverage: 70
          max_iterations: 3
          run_each_test_separately: true
          additional_instructions: >-
            Follow the existing Mocha, Chai, and Supertest conventions.
            Generate new tests for changed production files under backend only.
            Treat tests/helpers/supertest-app.js as test infrastructure, not as
            the production source file whose coverage should be improved.
            Add tests only; do not modify production code.
            Do not call real external services.
